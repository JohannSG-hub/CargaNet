<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tracking - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="envios.html">Envíos</a>
    <a class="active" href="tracking.html">Tracking</a>
    <a href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Seguimiento de envío</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="surface p-3 mb-3">
      <h6>Buscar envío por código</h6>
      <div class="row g-2">
        <div class="col-md-10">
          <input id="codigoBusqueda" class="form-control" placeholder="Ej: CN-1713275000000-AB12CD" onkeydown="if(event.key==='Enter') buscarEnvio()">
        </div>
        <div class="col-md-2 d-grid">
          <button onclick="buscarEnvio()" class="btn btn-primary">Buscar</button>
        </div>
      </div>
    </div>

    <div id="resultadoTracking" class="surface p-3">
      <p class="text-muted mb-0">Ingresa un código para consultar el envío.</p>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/tracking.js"></script>
</body>
</html>
