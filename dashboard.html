<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6f9; }
.sidebar {
  width:220px; height:100vh; position:fixed;
  background:#1f2937; color:white; padding:20px;
}
.sidebar a { color:#cbd5e1; display:block; margin:10px 0; text-decoration:none; }
.sidebar a:hover { color:white; }
.content { margin-left:240px; padding:20px; }
.card { border:none; border-radius:10px; }
</style>
</head>

<body>

<div class="sidebar">
  <h4>CargaNet</h4>
  <a href="dashboard.html">Dashboard</a>
  <a href="clientes.html">Clientes</a>
  <a href="envios.html">Envíos</a>
  <a href="reportes.html">Reportes</a>
</div>

<div class="content">

<div class="d-flex justify-content-between mb-3">
  <h3>Dashboard</h3>
  <button onclick="logout()" class="btn btn-danger">Salir</button>
</div>

<div class="row g-3">
  <div class="col-md-4">
    <div class="card p-3 bg-primary text-white">
      <h6>Clientes</h6>
      <h2 id="clientes">0</h2>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 bg-warning text-white">
      <h6>En tránsito</h6>
      <h2 id="transito">0</h2>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3 bg-success text-white">
      <h6>Entregados</h6>
      <h2 id="entregado">0</h2>
    </div>
  </div>
</div>

<hr>

<canvas id="graficoEstados"></canvas>

</div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
