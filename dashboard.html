<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f4f6f9;
}

.card-hover:hover {
  transform: translateY(-5px);
  transition: 0.3s;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold" href="#">🚚 CargaNet</a>

  <div class="ms-auto">
    <button class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">

  <div class="mb-4">
    <h2 class="fw-bold">Panel de Control</h2>
    <p class="text-muted">Gestión general del sistema de transporte</p>
  </div>

  <!-- TARJETAS -->
  <div class="row g-4">

    <!-- CLIENTES -->
    <div class="col-md-4">
      <div class="card shadow card-hover h-100">
        <div class="card-body text-center">
          <h1>👤</h1>
          <h5 class="card-title mt-2">Clientes</h5>
          <p class="text-muted">Registro y gestión de clientes</p>
          <a href="clientes.html" class="btn btn-primary w-100">Ingresar</a>
        </div>
      </div>
    </div>

    <!-- ENVÍOS -->
    <div class="col-md-4">
      <div class="card shadow card-hover h-100">
        <div class="card-body text-center">
          <h1>📦</h1>
          <h5 class="card-title mt-2">Envíos</h5>
          <p class="text-muted">Control logístico de paquetes</p>
          <a href="envios.html" class="btn btn-success w-100">Ingresar</a>
        </div>
      </div>
    </div>

    <!-- REPORTES -->
    <div class="col-md-4">
      <div class="card shadow card-hover h-100">
        <div class="card-body text-center">
          <h1>📊</h1>
          <h5 class="card-title mt-2">Reportes</h5>
          <p class="text-muted">Análisis y estadísticas</p>
          <button class="btn btn-secondary w-100">Próximamente</button>
        </div>
      </div>
    </div>

  </div>

  <!-- RESUMEN -->
  <div class="row mt-5">

    <div class="col-md-4">
      <div class="card text-white bg-primary shadow">
        <div class="card-body">
          <h6>Total Clientes</h6>
          <h3 id="totalClientes">0</h3>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-warning shadow">
        <div class="card-body">
          <h6>Envíos en tránsito</h6>
          <h3 id="totalTransito">0</h3>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-white bg-success shadow">
        <div class="card-body">
          <h6>Entregados</h6>
          <h3 id="totalEntregado">0</h3>
        </div>
      </div>
    </div>

  </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
