<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Envíos - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a class="active" href="envios.html">Envíos</a>
    <a href="tracking.html">Tracking</a>
    <a href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Gestión de envíos</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="surface p-3 mb-3">
      <h6>Crear envío</h6>
      <div class="row g-2">
        <div class="col-md-3">
          <select id="clienteSelect" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <input id="destinatario" class="form-control" placeholder="Destinatario">
        </div>
        <div class="col-md-4">
          <input id="descripcion" class="form-control" placeholder="Descripción del envío">
        </div>
        <div class="col-md-2 d-grid">
          <button onclick="crearEnvio()" class="btn btn-primary">Crear</button>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="kanban-column">
          <div class="kanban-header">Almacén</div>
          <div id="almacen" class="kanban-content"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-column">
          <div class="kanban-header">Tránsito</div>
          <div id="transito" class="kanban-content"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-column">
          <div class="kanban-header">Entregado</div>
          <div id="entregado" class="kanban-content"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/envios.js"></script>
</body>
</html>
