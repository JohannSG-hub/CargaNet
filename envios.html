<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Envíos - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.col-kanban {
  min-height: 400px;
}
.card-envio {
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">CargaNet - Envíos</span>
  <a href="dashboard.html" class="btn btn-secondary">Volver</a>
</nav>

<div class="container mt-4">

  <h3>Gestión de Envíos</h3>

  <!-- BOTON -->
  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalEnvio">
    Nuevo Envío
  </button>

  <!-- KANBAN -->
  <div class="row">

    <div class="col-md-4">
      <h5>En Almacén</h5>
      <div id="almacen" class="col-kanban bg-light p-2 rounded"></div>
    </div>

    <div class="col-md-4">
      <h5>En Tránsito</h5>
      <div id="transito" class="col-kanban bg-light p-2 rounded"></div>
    </div>

    <div class="col-md-4">
      <h5>Entregado</h5>
      <div id="entregado" class="col-kanban bg-light p-2 rounded"></div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalEnvio">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Nuevo Envío</h5>
      </div>

      <div class="modal-body">
        <input type="text" id="cliente" class="form-control mb-2" placeholder="Cliente">
        <input type="text" id="descripcion" class="form-control mb-2" placeholder="Descripción">
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="crearEnvio()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<script type="module" src="js/envios.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
