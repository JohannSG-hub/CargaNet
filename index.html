<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CargaNet - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0d6efd, #0a58ca);
}
</style>

</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card shadow-lg p-4" style="width: 350px;">
  <h3 class="text-center mb-3">CargaNet</h3>
  <p class="text-center text-muted">Sistema de Transporte</p>

  <input type="email" id="email" class="form-control mb-3" placeholder="Correo">
  <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

  <button onclick="login()" class="btn btn-primary w-100">Ingresar</button>
</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
