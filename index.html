<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CargaNet - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">
  <h3 class="text-center mb-3">CargaNet</h3>

  <input type="email" id="email" class="form-control mb-2" placeholder="Correo">
  <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

  <button onclick="login()" class="btn btn-primary w-100">Ingresar</button>
</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
