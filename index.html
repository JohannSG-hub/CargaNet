<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-primary">

<div class="card p-4" style="width:350px;">

<div id="loginBox">
<h4>Login</h4>
<input id="loginEmail" class="form-control mb-2" placeholder="Correo">
<input id="loginPassword" type="password" class="form-control mb-2" placeholder="Contraseña">
<button onclick="login()" class="btn btn-dark w-100">Ingresar</button>
<p><a href="#" onclick="mostrarRegistro()">Crear cuenta</a></p>
</div>

<div id="registroBox" style="display:none;">
<h4>Registro</h4>
<input id="nombre" class="form-control mb-2" placeholder="Nombre">
<input id="registroEmail" class="form-control mb-2" placeholder="Correo">
<input id="registroPassword" type="password" class="form-control mb-2" placeholder="Contraseña">
<button onclick="registrar()" class="btn btn-success w-100">Registrarse</button>
<p><a href="#" onclick="mostrarLogin()">Volver</a></p>
</div>

</div>

<script type="module" src="js/auth.js"></script>

<script>
function mostrarRegistro(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registroBox").style.display="block";
}
function mostrarLogin(){
document.getElementById("loginBox").style.display="block";
document.getElementById("registroBox").style.display="none";
}
</script>

</body>
</html>
