<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CargaNet</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="card">

    <!-- LOGIN -->
    <div id="loginBox">

      <h2>CargaNet</h2>
      <p class="subtitle">Acceso al sistema</p>

      <div class="input-group">
        <input type="email" id="loginEmail" required>
        <label>Correo electrónico</label>
      </div>

      <div class="input-group">
        <input type="password" id="loginPassword" required>
        <label>Contraseña</label>
      </div>

      <button onclick="login()" class="btn">Ingresar</button>

      <p class="switch">
        ¿No tienes cuenta?
        <span onclick="mostrarRegistro()">Crear cuenta</span>
      </p>

    </div>

    <!-- REGISTRO -->
    <div id="registroBox" class="hidden">

      <h2>Crear Cuenta</h2>
      <p class="subtitle">Registro de usuario</p>

      <div class="input-group">
        <input type="text" id="nombre" required>
        <label>Nombre</label>
      </div>

      <div class="input-group">
        <input type="email" id="registroEmail" required>
        <label>Correo electrónico</label>
      </div>

      <div class="input-group">
        <input type="password" id="registroPassword" required>
        <label>Contraseña</label>
      </div>

      <button onclick="registrar()" class="btn">Registrarse</button>

      <p class="switch">
        ¿Ya tienes cuenta?
        <span onclick="mostrarLogin()">Iniciar sesión</span>
      </p>

    </div>

  </div>

</div>

<script type="module" src="js/auth.js"></script>

<script>
function mostrarRegistro(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("registroBox").classList.remove("hidden");
}

function mostrarLogin(){
  document.getElementById("registroBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}
</script>

</body>
</html>
