<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">CargaNet - Clientes</span>
  <a href="dashboard.html" class="btn btn-secondary">Volver</a>
</nav>

<div class="container mt-4">

  <div class="row">

    <!-- FORM -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h5>Registrar Cliente</h5>

        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input type="text" id="dni" class="form-control mb-3" placeholder="DNI">

        <button onclick="guardarCliente()" class="btn btn-success w-100">Guardar</button>
      </div>
    </div>

    <!-- LISTA -->
    <div class="col-md-8">
      <div class="card shadow p-3">
        <h5>Lista de Clientes</h5>

        <ul id="lista" class="list-group mt-3"></ul>
      </div>
    </div>

  </div>

</div>

<script type="module" src="js/clientes.js"></script>

</body>
</html>
